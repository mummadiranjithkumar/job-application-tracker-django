{% extends 'applications/base.html' %}

{% block content %}
<h1>Delete Job</h1>
<p>Are you sure you want to delete "{{ job }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'job_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
